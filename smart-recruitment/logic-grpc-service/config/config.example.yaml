# 复制本文件为同目录下的 config.yaml（勿提交仓库）。本目录只保留本示例与本地 config.yaml，OSS/千问等均写入 config.yaml 对应段。
# 两个服务（logic-grpc-service、web-gin-service）共用本文件。
# Logic：在 logic-grpc-service 目录启动时默认读取 ./config/config.yaml；也可设置 CONFIG_FILE。
# Web：在 web-gin-service 目录启动时默认读取 ../logic-grpc-service/config/config.yaml。
# 优先级：本文件 → 环境变量（同名字段环境变量覆盖配置文件）。

logic:
  grpc_addr: ":50051"
  mysql_dsn: "root:YOUR_PASSWORD@tcp(127.0.0.1:3306)/recruitment?parseTime=true&charset=utf8mb4"

web:
  http_addr: ":8080"
  # gRPC 客户端连 Logic 的地址（无协议前缀，与 logic.grpc_addr 监听一致）
  logic_grpc_addr: "127.0.0.1:50051"
  jwt_secret: "dev-change-me"

oss:
  bucket: my-jinshan-private-bucket
  region: cn-wuhan-lr
  endpoint: https://oss-cn-wuhan-lr.aliyuncs.com
  access_key_id: "<RAM 用户 AK>"
  secret_access_key: "<RAM 用户 SK>"

# 通义千问（阿里云 DashScope）。api_key 填 DashScope API Key；base_url 填 /v1 根路径（若误填 .../chat/completions 会自动截断）。
qwen:
  api_key: ""
  model: "qwen-plus"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
